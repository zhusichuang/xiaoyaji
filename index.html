<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小芽记后端</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
        background: #f4f7f2;
        color: #243228;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(79, 103, 72, 0.08);
      }
      h1 {
        margin: 0 0 12px;
      }
      p, li {
        line-height: 1.7;
      }
      code {
        background: #edf5ee;
        padding: 2px 8px;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>小芽记 CloudBase Run API</h1>
        <p>这个容器服务已经从示例计数器改成了小芽记后端，当前提供登录、家庭、宝宝、记录、今日统计和 AI mock 接口。</p>
        <p>健康检查：<code>GET /healthz</code></p>
        <p>主要 API：</p>
        <ul>
          <li><code>POST /api/login</code></li>
          <li><code>GET /api/babies</code></li>
          <li><code>POST /api/actions</code></li>
          <li><code>GET /api/summary/today</code></li>
          <li><code>POST /api/ai/parse</code></li>
          <li><code>POST /api/ai/chat</code></li>
        </ul>
      </div>
    </div>
  </body>
</html>
